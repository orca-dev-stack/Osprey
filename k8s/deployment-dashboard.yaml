apiVersion: apps/v1
kind: Deployment
metadata:
  name: osprey-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osprey-dashboard
  template:
    metadata:
      labels:
        app: osprey-dashboard
    spec:
      containers:
        - name: dashboard
          image: your-registry/osprey-dashboard:latest
          ports:
            - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: osprey-dashboard
spec:
  selector:
    app: osprey-dashboard
  ports:
    - port: 80
      targetPort: 8501
      protocol: TCP
  type: LoadBalancer
