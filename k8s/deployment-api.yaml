apiVersion: apps/v1
kind: Deployment
metadata:
  name: osprey-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: osprey-api
  template:
    metadata:
      labels:
        app: osprey-api
    spec:
      containers:
        - name: api
          image: your-registry/osprey-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DB_DSN
              value: "postgresql://osprey:osprey@postgres:5432/osprey"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
---
apiVersion: v1
kind: Service
metadata:
  name: osprey-api
spec:
  selector:
    app: osprey-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: LoadBalancer
